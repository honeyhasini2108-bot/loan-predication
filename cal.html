<!DOCTYPE html>
<html>
<head>
    <title>Loan Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: url("bg.jpeg.jpeg") ;
            background-size: cover;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px;
            width: 48%;
            margin: 5px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .result-box {
            background: #f2f2f2;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🏦 Loan Calculator 🏦</h2>
    <label>Loan Amount (₹):</label>
    <input type="number" id="loanAmount">
    <label>Months:</label>
    <input type="number" id="months">
    <label>Interest Rate (% per year):</label>
    <input type="number" id="interestRate">
    <div>
        <button onclick="calculateLoan()">Calculate</button>
        <button onclick="goNext()">Next</button>
        <a href="main.html"><button>Skip</button></a>
    </div>
    <h3>Loan Details:</h3>
    <div id="result" class="result-box"></div>
</div>
<script>
let isCalculated = false;
function calculateLoan() {
    let loanAmount = parseFloat(document.getElementById('loanAmount').value);
    let months = parseInt(document.getElementById('months').value);
    let annualInterestRate = parseFloat(document.getElementById('interestRate').value);
    if (!loanAmount || loanAmount <= 0) { alert("Enter valid amount"); return; }
    if (!months || months <= 0) { alert("Enter valid months"); return; }
    if (annualInterestRate < 0) { alert("Enter valid interest"); return; }
    let monthlyRate = annualInterestRate / 12 / 100;
    let emi = monthlyRate > 0
        ? loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months) /
          (Math.pow(1 + monthlyRate, months) - 1)
        : loanAmount / months;
    let totalPayment = emi * months;
    let totalInterest = totalPayment - loanAmount;
    document.getElementById('result').innerHTML = `
        <b>Monthly EMI:</b> ₹${emi.toFixed(2)}<br>
        <b>Total Payment:</b> ₹${totalPayment.toFixed(2)}<br>
        <b>Total Interest:</b> ₹${totalInterest.toFixed(2)}
    `;
    isCalculated = true; // calculation completed
}
function goNext() {
    if (!isCalculated) {
        alert("Please complete the calculation");
        return;
    }
    window.location.href = "main.html";
}
</script>
</body>
</html>
